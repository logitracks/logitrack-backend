name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'logitrack-backend/**'   # adaptez au nom de votre dossier backend
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'logitrack-backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./logitrack-backend   # dossier backend

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: './logitrack-backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

      # Optionnel : déploiement automatique (exemple avec Heroku)
